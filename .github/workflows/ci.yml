name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: 1.96.0
          components: clippy,rustfmt
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --all-features --no-deps --locked

  test:
    name: Test (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux stable
            os: ubuntu-latest
            toolchain: 1.96.0
          - name: Linux MSRV
            os: ubuntu-latest
            toolchain: 1.89.0
          - name: macOS stable
            os: macos-latest
            toolchain: 1.96.0
          - name: Windows stable
            os: windows-latest
            toolchain: 1.96.0
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: ${{ matrix.toolchain }}
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run tests
        run: cargo test --workspace --all-features --locked

  public-clients:
    name: Public client conformance
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: 1.96.0
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install pinned Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.16.0
          package-manager-cache: false
      - name: Install pinned Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.11.15
      - name: Check generated SDK models
        run: python tools/generate_sdk_models.py --check
      - name: Build and test TypeScript SDK
        working-directory: sdks/typescript
        run: |
          npm ci --ignore-scripts
          npm test
      - name: Test Python SDK
        env:
          PYTHONPATH: sdks/python/src
        run: |
          python -m compileall -q sdks/python/src sdks/python/conformance sdks/python/tests
          python -m unittest discover -s sdks/python/tests -v
      - name: Build public Rust clients and single binary
        run: cargo build -p hyphae-cli -p hyphae-conformance-rust --locked
      - name: Run common live conformance suite
        run: python tools/run_conformance.py

  optional-integrations:
    name: Optional framework integrations
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: 1.96.0
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install pinned Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.16.0
          package-manager-cache: false
      - name: Enforce public-only integration boundaries
        run: python tools/check_integration_boundaries.py
      - name: Build public TypeScript SDK
        working-directory: sdks/typescript
        run: |
          npm ci --ignore-scripts
          npm test
      - name: Test optional JavaScript adapters
        working-directory: integrations/javascript
        run: |
          npm ci --ignore-scripts
          npm audit --audit-level=moderate
          npm test
      - name: Prove hosts build without Hyphae
        working-directory: integrations/host-smoke
        run: |
          npm ci --ignore-scripts
          npm audit --audit-level=moderate
          npm test
      - name: Build standalone server
        run: cargo build -p hyphae-cli --locked
      - name: Run live adapter conformance
        run: python tools/run_integration_conformance.py

  release-readiness:
    name: Release readiness
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: 1.96.0
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install pinned Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.11.15
      - name: Build the standalone binary
        run: cargo build -p hyphae-cli --locked
      - name: Audit publishable crate contents
        run: python tools/check_crate_packages.py
      - name: Validate documentation and executable embedded example
        run: |
          python tools/check_documentation.py --binary target/debug/hyphae
          python tools/run_documentation_examples.py --binary target/debug/hyphae
          cargo run -p hyphae-engine --example embedded --locked -- "$RUNNER_TEMP/hyphae-doc-example"
      - name: Verify historical disk fixtures are reproducible
        run: python tools/generate_compatibility_fixture.py --binary target/debug/hyphae --check compatibility/v1/data-directory.json
      - name: Test deterministic packaging and checksums
        run: |
          python -m compileall -q packaging tools
          python packaging/test_package.py
      - name: Install from a generated Linux archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/install
          python packaging/package.py \
            --binary target/debug/hyphae \
            --target x86_64-unknown-linux-gnu \
            --output-dir artifacts
          tar -xzf artifacts/*.tar.gz -C artifacts/install
          installed="$(find artifacts/install -type f -name hyphae -print -quit)"
          test -n "$installed"
          "$installed" version --json
