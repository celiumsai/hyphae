name: Stress

on:
  pull_request:
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**"
      - "tools/run_load_gate.py"
      - "tools/run_soak_gate.py"
      - ".github/workflows/stress.yml"
  push:
    branches:
      - main
  schedule:
    - cron: "43 3 * * 2"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stress:
    name: Load and kill/restart soak
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: 1.96.0
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build standalone binary
        run: cargo build -p hyphae-cli --locked
      - name: Run bounded concurrent load gate
        run: python tools/run_load_gate.py
      - name: Run kill/restart and backup/restore soak gate
        run: python tools/run_soak_gate.py
