name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  package:
    name: Package ${{ matrix.target }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            binary: target/x86_64-unknown-linux-gnu/dist/hyphae
          - os: macos-15-intel
            target: x86_64-apple-darwin
            binary: target/x86_64-apple-darwin/dist/hyphae
          - os: macos-14
            target: aarch64-apple-darwin
            binary: target/aarch64-apple-darwin/dist/hyphae
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            binary: target/x86_64-pc-windows-msvc/dist/hyphae.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: release-${{ matrix.target }}
      - name: Build native single binary
        run: cargo build --profile dist -p hyphae-cli --target ${{ matrix.target }} --locked
      - name: Build deterministic release archive
        run: python packaging/package.py --binary "${{ matrix.binary }}" --target "${{ matrix.target }}" --output-dir artifacts
      - name: Install pinned Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1
      - name: Generate, attest, and verify native build provenance
        shell: bash
        env:
          CERTIFICATE_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/release.yml@${{ github.ref }}
        run: |
          set -euo pipefail
          archive="$(find artifacts -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print -quit)"
          test -n "$archive"
          predicate="${archive}.provenance.json"
          bundle="${archive}.intoto.sigstore.json"
          python packaging/provenance.py \
            --target "${{ matrix.target }}" \
            --commit "${{ github.sha }}" \
            --git-ref "${{ github.ref }}" \
            --invocation-id "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}" \
            --runner-os "${{ runner.os }}" \
            --runner-arch "${{ runner.arch }}" \
            --output "$predicate"
          cosign attest-blob --yes \
            --predicate "$predicate" \
            --type slsaprovenance1 \
            --bundle "$bundle" \
            "$archive"
          cosign verify-blob-attestation \
            --bundle "$bundle" \
            --type slsaprovenance1 \
            --certificate-identity "$CERTIFICATE_IDENTITY" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "$archive"
      - name: Upload native archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hyphae-${{ matrix.target }}
          path: artifacts/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  assemble:
    name: Assemble and verify release candidate
    needs: package
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download native archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: hyphae-*
          path: dist
          merge-multiple: true
      - name: Resolve and validate release version
        shell: bash
        run: |
          set -euo pipefail
          release_tag="$(python packaging/finalize_release.py --print-expected-tag)"
          if [[ "$GITHUB_REF_TYPE" == tag ]]; then
            test "$GITHUB_REF_NAME" = "$release_tag"
          fi
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
      - name: Generate SPDX JSON SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: dist/hyphae-${{ env.RELEASE_TAG }}.spdx.json
          syft-version: v1.46.0
          upload-artifact: false
          upload-release-assets: false
      - name: Generate CycloneDX JSON SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: dist/hyphae-${{ env.RELEASE_TAG }}.cdx.json
          syft-version: v1.46.0
          upload-artifact: false
          upload-release-assets: false
      - name: Validate tag and create checksums
        run: python packaging/finalize_release.py --directory dist --tag "${{ env.RELEASE_TAG }}"
      - name: Install pinned Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1
      - name: Sign and verify every release asset
        shell: bash
        env:
          CERTIFICATE_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/release.yml@${{ github.ref }}
        run: |
          set -euo pipefail
          spdx="dist/hyphae-${RELEASE_TAG}.spdx.json"
          cyclonedx="dist/hyphae-${RELEASE_TAG}.cdx.json"
          for archive in dist/*.tar.gz dist/*.zip; do
            cosign attest-blob --yes \
              --predicate "$spdx" --type spdxjson \
              --bundle "${archive}.spdx.attestation.sigstore.json" \
              "$archive"
            cosign verify-blob-attestation \
              --bundle "${archive}.spdx.attestation.sigstore.json" \
              --type spdxjson \
              --certificate-identity "$CERTIFICATE_IDENTITY" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              "$archive"
            cosign attest-blob --yes \
              --predicate "$cyclonedx" --type cyclonedx \
              --bundle "${archive}.cyclonedx.attestation.sigstore.json" \
              "$archive"
            cosign verify-blob-attestation \
              --bundle "${archive}.cyclonedx.attestation.sigstore.json" \
              --type cyclonedx \
              --certificate-identity "$CERTIFICATE_IDENTITY" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              "$archive"
          done
          for artifact in dist/*; do
            case "$artifact" in
              *.sigstore.json) continue ;;
            esac
            cosign sign-blob --yes --bundle "${artifact}.sigstore.json" "$artifact"
            cosign verify-blob \
              --bundle "${artifact}.sigstore.json" \
              --certificate-identity "$CERTIFICATE_IDENTITY" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              "$artifact"
          done
      - name: Recheck release checksums
        run: python packaging/finalize_release.py --directory dist --tag "${{ env.RELEASE_TAG }}" --verify
      - name: Upload verified release candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hyphae-release-candidate
          path: dist/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  publish:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: assemble
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download verified release candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: hyphae-release-candidate
          path: dist
      - name: Recheck tag and checksums before publication
        run: python packaging/finalize_release.py --directory dist --tag "${{ github.ref_name }}" --verify
      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          arguments=(--verify-tag --generate-notes --title "Hyphae ${GITHUB_REF_NAME}")
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            arguments+=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" dist/* "${arguments[@]}"
